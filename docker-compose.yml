# ─────────────────────────────────────────────────────────────────────
# Callman — on-prem stack (ALL-IN-ONE / bundled by default).
#
# Runs the Callman backend from a pre-built registry image plus a bundled
# MongoDB + Redis, so a single `docker compose up -d` gives a working
# install. No source is built here — the image is pulled by version tag.
#
# Quick start:
#     cp .env.example .env     # fill in CALLMAN_VERSION + secrets
#     docker compose pull
#     docker compose up -d
#     curl http://localhost:${CALLMAN_PORT}/health
#
# Full guide: docs/INSTALL.md
# ─────────────────────────────────────────────────────────────────────

name: callman

# Shared backend image config (HTTP server, worker, and migrate are the
# same image, different commands).
x-app: &app
  image: ghcr.io/yurdtech/callman-backend:${CALLMAN_VERSION:?set CALLMAN_VERSION in .env}
  env_file:
    - .env
  restart: unless-stopped

# DB/cache connection strings are CONSTRUCTED here from the bundled
# passwords so they always match the mongo/redis services below — the
# customer never hand-writes a connection URI. (For EXTERNAL databases,
# see docs/ENVIRONMENT.md → "Using your own MongoDB / Redis".)
x-db-env: &db-env
  MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/callman?authSource=admin
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

services:
  # One-shot schema migration. Backs up the DB (mongodump → /backups) and
  # applies pending migrations, then exits. The app waits for it.
  migrate:
    <<: *app
    container_name: callman-migrate
    command: ["node", "dist/migrations/cli.js", "up"]
    restart: "no"
    environment: *db-env
    volumes:
      - backups:/backups
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    <<: *app
    container_name: callman-backend
    command: ["node", "dist/server.js"]
    init: true
    environment:
      # Single source for the port: the API binds to it AND it is published
      # below — so the URL you curl is the URL the app listens on.
      <<: *db-env
      PORT: ${CALLMAN_PORT:-8080}
    ports:
      - "${CALLMAN_PORT:-8080}:${CALLMAN_PORT:-8080}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${CALLMAN_PORT:-8080}/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *app
    container_name: callman-worker
    command: ["node", "dist/worker.js"]
    init: true
    environment: *db-env
    volumes:
      - backups:/backups
    depends_on:
      migrate:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Bundled MongoDB (standalone — the backend uses no multi-document
  # transactions, so a replica set is NOT required). Not published to the
  # host; only the app containers reach it over the internal network.
  mongo:
    image: mongo:7
    container_name: callman-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?set MONGO_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # `ping` is allowed pre-auth, so no credentials needed here.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Bundled Redis. `noeviction` is CRITICAL — BullMQ stores jobs in Redis
  # and must never have them evicted under memory pressure. `appendonly`
  # persists across restarts. Password-protected; not published to the host.
  redis:
    image: redis:7-alpine
    container_name: callman-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "noeviction"
      - "--requirepass"
      - "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # On-prem admin panel — ONE image (NestJS API + bundled React SPA served
  # same-origin on a single port), built from the DEDICATED
  # callman-onprem-admin-panel repo (the on-prem-only admin with org groups,
  # activity log, group access, dashboard analytics). It is INDEPENDENT of
  # backend/worker: it talks DIRECTLY to the SAME bundled MongoDB, with its OWN
  # auth + JWT secrets (it does NOT share the backend's encryption/JWT keys, and
  # never calls the backend API). By default it can only READ Callman data
  # (CALLMAN_DB_WRITE_ENABLED=false).
  admin:
    image: ghcr.io/yurdtech/callman-onprem-admin:${CALLMAN_ADMIN_VERSION:?set CALLMAN_ADMIN_VERSION in .env}
    container_name: callman-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Internal port is fixed at 5100 (matches the image's baked HEALTHCHECK).
      PORT: 5100
      # SAME bundled Mongo + DB as the backend — admin reads the same database.
      # Built from the bundled creds so it always matches (no hand-written URI).
      CALLMAN_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/callman?authSource=admin
    ports:
      - "${CALLMAN_ADMIN_PORT:-5100}:5100"
    depends_on:
      # Hard requirement: admin connects directly to Mongo on boot.
      mongo:
        condition: service_healthy
      # Wait for the one-shot migrate so admin reads an already-migrated schema
      # (it shares the DB). This is DB-readiness ordering, NOT a dependency on
      # the backend/worker app tier — admin never calls the backend API.
      migrate:
        condition: service_completed_successfully

volumes:
  mongo_data:
  redis_data:
  backups:
